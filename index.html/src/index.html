<div id="app">
  <div id="mirror-overlay" class="overlay active">
    <div class="content">
      <p class="instruction">Stare into the black mirror.</p>
      <p class="instruction-cn">直视黑屏中的你</p>
      <div class="timer" id="timer">5</div>
      <button id="break-btn" class="hidden">Break the surface / 打破镜面</button>
    </div>
  </div>

  <div id="quote-screen" class="screen">
    <div class="quote-container">
      <p id="quote-cn" class="quote-cn"></p>
      <hr class="divider">
      <p id="quote-en" class="quote-en"></p>
      <p id="author" class="author"></p>
    </div>
    <button id="retry-btn">Reflect Again / 再次对话</button>
  </div>
</div>
